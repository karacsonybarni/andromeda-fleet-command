name: Gameplay trailer capture

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "art/**"
      - "Main.tscn"
      - "project.godot"
      - "AndromedaFleetCommand.Game.csproj"
      - "scripts/verify-trailer.py"
      - ".github/workflows/trailer.yml"

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GODOT_VERSION: "4.7"
      GODOT_STATUS: "stable"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Download official Godot .NET editor
        shell: bash
        run: |
          set -euo pipefail
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}"
          curl -fL "$base/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_mono_linux_x86_64.zip" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          editor="$(find /tmp/godot -type f -name 'Godot_*mono_linux.x86_64' | head -1)"
          chmod +x "$editor"
          echo "GODOT_EDITOR=$editor" >> "$GITHUB_ENV"
      - name: Install media tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg
      - name: Build and render deterministic gameplay
        shell: bash
        run: |
          set -euo pipefail
          dotnet build AndromedaFleetCommand.Game.csproj --configuration Release
          "$GODOT_EDITOR" --headless --editor --path . --quit-after 10
          dotnet build AndromedaFleetCommand.Game.csproj --configuration Debug
          mkdir -p trailer
          log="$(mktemp)"
          HOME="$(mktemp -d)" LIBGL_ALWAYS_SOFTWARE=1 \
            timeout 480s xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24 -ac" \
            "$GODOT_EDITOR" --path . --resolution 1920x1080 --write-movie \
            "$PWD/trailer/andromeda-fleet-command.avi" --fixed-fps 30 -- --trailer 2>&1 | tee "$log"
          grep -q "AFC_TRAILER_PASS" "$log"
      - name: Encode and validate campaign-ready MP4
        shell: bash
        run: |
          set -euo pipefail
          ffmpeg -y -i trailer/andromeda-fleet-command.avi \
            -c:v libx264 -preset medium -crf 18 -pix_fmt yuv420p \
            -af loudnorm=I=-16:TP=-1.5:LRA=11 -c:a aac -b:a 192k -movflags +faststart \
            trailer/andromeda-fleet-command-trailer.mp4
          python3 scripts/verify-trailer.py trailer/andromeda-fleet-command-trailer.mp4
          ffmpeg -i trailer/andromeda-fleet-command-trailer.mp4 \
            -filter_complex ebur128=peak=true -f null - 2> trailer/audio-analysis.txt
          grep -q "Integrated loudness:" trailer/audio-analysis.txt
      - uses: actions/upload-artifact@v4
        with:
          name: gameplay-trailer-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            trailer/andromeda-fleet-command-trailer.mp4
            trailer/audio-analysis.txt
          if-no-files-found: error
