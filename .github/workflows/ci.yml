name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet run --project tests/AndromedaFleetCommand.Core.Tests
      - run: dotnet build AndromedaFleetCommand.Game.csproj --configuration Release
