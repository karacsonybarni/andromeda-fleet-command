name: Build desktop demo

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.7"
      GODOT_STATUS: "stable"
      GODOT_DIR: ${{ github.workspace }}/.tools/godot
      WHISPER_VERSION: "1.9.1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Download official Godot .NET editor and export templates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GODOT_DIR" "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}.mono"
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}"
          curl -fL "$base/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_mono_linux_x86_64.zip" -o /tmp/godot.zip
          curl -fL "$base/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_mono_export_templates.tpz" -o /tmp/templates.tpz
          unzip -q /tmp/godot.zip -d "$GODOT_DIR"
          unzip -q /tmp/templates.tpz -d /tmp/godot-templates
          cp -R /tmp/godot-templates/templates/. "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}.mono/"
          editor="$(find "$GODOT_DIR" -type f -name 'Godot_*mono_linux.x86_64' | head -1)"
          chmod +x "$editor"
          echo "GODOT_EDITOR=$editor" >> "$GITHUB_ENV"
      - name: Download verified whisper.cpp runtime bundles
        shell: bash
        run: |
          set -euo pipefail
          base="https://github.com/ggml-org/whisper.cpp/releases/download/v${WHISPER_VERSION}"
          curl -fL "$base/whisper-bin-ubuntu-x64.tar.gz" -o /tmp/whisper-linux.tar.gz
          curl -fL "$base/whisper-bin-x64.zip" -o /tmp/whisper-windows.zip
          echo "f3bf3b4369a99b54665b0f19b88483b30de27f25963b0414235dea03198515c5  /tmp/whisper-linux.tar.gz" | sha256sum -c -
          echo "7d8be46ecd31828e1eb7a2ecdd0d6b314feafd82163038ab6092594b0a063539  /tmp/whisper-windows.zip" | sha256sum -c -
      - name: Test and build
        run: |
          dotnet run --project tests/AndromedaFleetCommand.Core.Tests
          dotnet build AndromedaFleetCommand.Game.csproj --configuration Release
      - name: Import and export
        run: |
          set -euo pipefail
          mkdir -p dist/windows dist/linux
          "$GODOT_EDITOR" --headless --editor --path . --quit-after 10
          "$GODOT_EDITOR" --headless --path . --export-release "Windows Desktop"
          "$GODOT_EDITOR" --headless --path . --export-release "Linux"
          mkdir -p dist/linux/tools/whisper dist/windows/tools/whisper
          tar --no-same-owner --wildcards -xzf /tmp/whisper-linux.tar.gz \
            -C dist/linux/tools/whisper --strip-components=1 \
            'whisper-bin-ubuntu-x64/whisper-cli' \
            'whisper-bin-ubuntu-x64/LICENSE' \
            'whisper-bin-ubuntu-x64/libwhisper.so*' \
            'whisper-bin-ubuntu-x64/libggml*.so*'
          unzip -j -q /tmp/whisper-windows.zip \
            'Release/whisper-cli.exe' 'Release/whisper.dll' 'Release/ggml*.dll' \
            -d dist/windows/tools/whisper
          cp dist/linux/tools/whisper/LICENSE dist/windows/tools/whisper/LICENSE
          ln -sfn libwhisper.so.1.9.1 dist/linux/tools/whisper/libwhisper.so.1
          ln -sfn libwhisper.so.1 dist/linux/tools/whisper/libwhisper.so
          ln -sfn libggml.so.0.15.1 dist/linux/tools/whisper/libggml.so.0
          ln -sfn libggml.so.0 dist/linux/tools/whisper/libggml.so
          ln -sfn libggml-base.so.0.15.1 dist/linux/tools/whisper/libggml-base.so.0
          ln -sfn libggml-base.so.0 dist/linux/tools/whisper/libggml-base.so
          chmod +x dist/linux/tools/whisper/whisper-cli
          dist/linux/tools/whisper/whisper-cli --version
          test -s dist/windows/tools/whisper/whisper-cli.exe
          test -x dist/linux/AndromedaFleetCommand.x86_64
          test -z "$(find dist/windows dist/linux -name '*.pdb' -print -quit)"
          smoke_log="$(mktemp)"
          HOME="$(mktemp -d)" timeout 30s dist/linux/AndromedaFleetCommand.x86_64 --headless -- --smoke-test 2>&1 | tee "$smoke_log"
          grep -q "AFC_SMOKE_PASS" "$smoke_log"
          ! grep -q "invalid UID" "$smoke_log"
          ./scripts/multiplayer-smoke.sh dist/linux/AndromedaFleetCommand.x86_64
          ./scripts/package-release.sh
          (cd dist/packages && sha256sum -c SHA256SUMS.txt)
          packaged_linux="$(find dist/packages -maxdepth 1 -name '*Linux-x64.tar.gz' -print -quit)"
          packaged_dir="$(mktemp -d)"
          tar --no-same-owner -xzf "$packaged_linux" -C "$packaged_dir"
          "$packaged_dir/tools/whisper/whisper-cli" --version
          packaged_smoke_log="$(mktemp)"
          HOME="$(mktemp -d)" timeout 30s \
            "$packaged_dir/AndromedaFleetCommand.x86_64" --headless -- --smoke-test \
            2>&1 | tee "$packaged_smoke_log"
          grep -q "AFC_SMOKE_PASS" "$packaged_smoke_log"
          ! grep -q "invalid UID" "$packaged_smoke_log"
      - uses: actions/upload-artifact@v4
        with:
          name: AndromedaFleetCommand-${{ github.ref_name }}
          path: dist/packages/*
          if-no-files-found: error
