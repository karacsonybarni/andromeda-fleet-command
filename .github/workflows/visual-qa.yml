name: Visual QA capture

on:
  pull_request:
    paths:
      - "src/**"
      - "art/**"
      - "Main.tscn"
      - "project.godot"
      - "AndromedaFleetCommand.Game.csproj"
      - ".github/workflows/visual-qa.yml"

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.7"
      GODOT_STATUS: "stable"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Download official Godot .NET editor
        shell: bash
        run: |
          set -euo pipefail
          base="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}"
          curl -fL "$base/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_mono_linux_x86_64.zip" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          editor="$(find /tmp/godot -type f -name 'Godot_*mono_linux.x86_64' | head -1)"
          chmod +x "$editor"
          echo "GODOT_EDITOR=$editor" >> "$GITHUB_ENV"
      - name: Build and capture rendered screens
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project tests/AndromedaFleetCommand.Core.Tests
          dotnet build AndromedaFleetCommand.Game.csproj --configuration Release
          "$GODOT_EDITOR" --headless --editor --path . --quit-after 10
          mkdir -p visual-qa
          log="$(mktemp)"
          HOME="$(mktemp -d)" AFC_VISUAL_QA_DIR="$PWD/visual-qa" \
            timeout 45s "$GODOT_EDITOR" --headless --path . -- --visual-qa 2>&1 | tee "$log"
          grep -q "AFC_VISUAL_QA_PASS captures=7" "$log"
          test "$(find visual-qa -type f -name '*.png' | wc -l)" -eq 7
      - uses: actions/upload-artifact@v4
        with:
          name: visual-qa-${{ github.event.pull_request.head.sha }}
          path: visual-qa/*.png
          if-no-files-found: error
